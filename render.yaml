services:
  # Single service serving both frontend and backend
  - type: web
    name: marketradar
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FRONTEND_ORIGIN
        value: https://marketradar-94rr.onrender.com
      - key: GROQ_API_KEY
        sync: false
    healthCheckPath: /health
    # Persistent disk for SQLite database
    disk:
      name: data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
