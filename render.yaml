services:
  # Backend API Service
  - type: web
    name: marketradar-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FRONTEND_ORIGIN
        value: https://marketradar-frontend.onrender.com
      - key: GROQ_API_KEY
        sync: false
    healthCheckPath: /health
    # Persistent disk for SQLite database
    disk:
      name: data
      mountPath: /opt/render/project/backend/data
      sizeGB: 1

  # Frontend Service
  - type: web
    name: marketradar-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run preview
    envVars:
      - key: VITE_API_URL
        value: https://marketradar-backend.onrender.com
